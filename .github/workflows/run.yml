name: nano bot

on:
  workflow_dispatch

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: install libraries
        run: pip install requests

      - name: run bot
        run: python bot.py
